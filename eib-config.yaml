apiVersion: 1.3

image:
  imageType: iso
  arch: x86_64
  baseImage: SL-Micro.x86_64-6.2-Base-SelfInstall-GM.install.iso
  outputImageName: suse-edge-elemental-prod.iso

operatingSystem:
  isoConfiguration:
    installDevice: /dev/vda

  packages:
    sccRegistrationCode: "YOUR_SCC_CODE"
    packageList:
      - qemu-guest-agent

  time:
    timezone: Asia/Kolkata

  users:
    - username: root
      encryptedPassword: "<HASHED_ROOT_PASSWORD>"

    - username: buildadmin
      createHomeDir: true
      groups:
        - wheel
      sshKeys:
        - "ssh-ed25519 AAAA..."

  systemd:
    enable:
      - sshd
      - chronyd
      - qemu-guest-agent

  configFiles:
    - path: /etc/sysctl.d/99-disable-ipv6.conf
      source: files/sysctl/99-disable-ipv6.conf
      permissions: 0644

    - path: /etc/sudoers.d/buildadmin
      source: files/sudoers/buildadmin
      permissions: 0440

    - path: /etc/pki/trust/anchors/corp-cloudflare-chain.pem
      source: files/ca/corp-cloudflare-chain.pem
      permissions: 0644

  scripts:
    post:
      - scripts/post.sh
